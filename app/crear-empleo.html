<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Empleo</title>

    <link href="./css/brite.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/estilos.css">
    <link rel="shortcut icon" href="./assets/images/baloon.ico" type="image/x-icon">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="https://code.jquery.com/jquery-4.0.0.min.js"
        integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao=" crossorigin="anonymous"></script>
    <script src="./js/form.js"></script>
    
    <script src="./js/crear-empleo.js"></script>
</head>

<body>
    <nav class="navbar navbar-expand-lg bg-dark" data-bs-theme="dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">App NoSql</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarColor01"
                aria-controls="navbarColor01" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarColor01">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="./index.html">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" href="./form.html">Registro Usuario</a></li>
                    <li class="nav-item"><a class="nav-link active" href="./crear-empleo.html">Registro Empleo</a></li>
                    <li class="nav-item"><a class="nav-link" href="./empleos.html">Ver Empleos</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container formulario mt-4">
        <form id="formularioEmpleo">
            <p class="h3">Formulario de Registro de Empleo</p>
            <hr>
            
            <div class="row mb-3">
                <div class="col">
                    <label for="selectUsuario" class="form-label">Asociar a Usuario (Trabajador):</label>
                    <select name="usuario" id="selectUsuario" class="form-select" required>
                        <option value="" selected>Seleccione el trabajador...</option>
                    </select>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col">
                    <label for="inputEmpresa" class="form-label">Empresa:</label>
                    <input type="text" name="empresa" id="inputEmpresa" class="form-control" required>
                </div>
                <div class="col">
                    <label for="inputCargo" class="form-label">Cargo:</label>
                    <input type="text" name="cargo" id="inputCargo" class="form-control" required>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col">
                    <label for="inputSalario" class="form-label">Salario Mensual:</label>
                    <input type="number" name="salario" id="inputSalario" class="form-control" required>
                </div>
                <div class="col">
                    <label for="selectModalidad" class="form-label">Modalidad:</label>
                    <select name="modalidad" id="selectModalidad" class="form-select" required>
                        <option value="" selected>Seleccione modalidad...</option>
                        <option value="Presencial">Presencial</option>
                        <option value="Remoto">Remoto</option>
                        <option value="Híbrido">Híbrido</option>
                    </select>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col">
                    <label for="dateFechaIngreso" class="form-label">Fecha de Ingreso:</label>
                    <input type="date" name="fechaIngreso" id="dateFechaIngreso" class="form-control">
                </div>
                <div class="col">
                    <label for="selectEstado" class="form-label">Estado Laboral:</label>
                    <select name="estado" id="selectEstado" class="form-select">
                        <option value="Activo" selected>Activo</option>
                        <option value="Inactivo">Inactivo</option>
                    </select>
                </div>
            </div>

            <div class="row mt-4">
                <div class="col d-flex justify-content-end">
                    <button type="reset" class="btn btn-secondary me-2">Cancelar</button>
                    <button type="button" class="btn btn-info" onclick="guardarNuevoEmpleo();">Guardar Empleo</button>
                </div>
            </div>
        </form>
    </div>
</body>
</html>
